name: Package

on:
  push:
    tags:
      - v*
  workflow_dispatch: {}

jobs:
  package:
    runs-on: ubuntu-slim

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare Artifact
        run:
          python3 -m scripts.package force clean
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: build/artifact/Expedition33-*.zip
          archive: false
          if-no-files-found: error
